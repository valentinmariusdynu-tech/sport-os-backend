version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: sportos
      POSTGRES_PASSWORD: sportos_dev
      POSTGRES_DB: sportos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ../sport-os-backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://sportos:sportos_dev@postgres:5432/sportos
    depends_on:
      - postgres

volumes:
  postgres_data:
